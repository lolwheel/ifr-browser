<!doctype html><html><head><meta charset="utf-8"><title>BIOS IFR Browser</title>
<style>
:root{--bg:#0a1530;--bar:#13284f;--fg:#cfe0ff;--mut:#7e93bf;--acc:#7ab8ff;--gold:#ffd479;--line:#1d3461;--rowh:#15315f}
*{box-sizing:border-box}html,body{margin:0;height:100%}
body{background:var(--bg);color:var(--fg);font:13px/1.45 ui-monospace,Menlo,Consolas,monospace;display:flex;flex-direction:column}
header{background:#06102a;border-bottom:1px solid var(--line);padding:8px 12px;display:flex;flex-wrap:wrap;gap:10px;row-gap:8px;align-items:center;flex:none}
header b{color:var(--gold);flex:none}
#stats{flex:0 1 auto;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.btn{background:#13284f;color:var(--fg);border:1px solid var(--line);border-radius:6px;padding:6px 10px;cursor:pointer;font:inherit;white-space:nowrap;flex:none}
.btn:hover{border-color:var(--acc)}
.sbox{position:relative;flex:1 1 340px;min-width:240px;max-width:580px}
.sbox:before{content:"\1F50D";position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:12px;opacity:.55;pointer-events:none}
#search{width:100%;padding:7px 10px 7px 30px;background:#0c1832;border:1px solid var(--line);border-radius:6px;color:var(--fg);font:inherit}
#search:focus{border-color:var(--acc);outline:none}
#main{flex:1;display:flex;min-height:0}
#side{width:280px;border-right:1px solid var(--line);overflow:auto;background:#091228;flex:none}
.sidehdr{padding:6px 12px;color:#5d6f99;font-size:10.5px;border-bottom:1px solid var(--line);text-transform:uppercase;letter-spacing:.04em}
#side .sf{padding:5px 12px;cursor:pointer;color:var(--mut);border-bottom:1px solid #0e1a33;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#side .sf:hover{background:var(--rowh);color:var(--fg)}#side .sf.act{background:var(--bar);color:var(--gold)}
#view{flex:1;overflow:auto}
#crumb{padding:8px 16px;color:var(--mut);background:#091228;border-bottom:1px solid var(--line);position:sticky;top:0;z-index:5}
#crumb a{color:var(--acc);cursor:pointer}#crumb .bk{color:var(--gold);margin-right:10px;cursor:pointer}
.form{max-width:1100px;margin:0 auto;padding:6px 0 60px}
.ftitle{text-align:center;color:var(--gold);font-weight:700;letter-spacing:.06em;padding:14px 14px 4px;text-transform:uppercase}
.backlinks{text-align:center;font-size:11.5px;color:var(--mut);padding:0 14px 12px;border-bottom:1px solid var(--line);margin-bottom:4px}
.backlinks a{color:var(--acc);cursor:pointer}.backlinks a:hover{text-decoration:underline}
.backlinks .none{color:#5d6f99;font-style:italic}.backlinks .meta{color:#456}
.sub{color:var(--acc);font-weight:700;margin:16px 12px 4px;border-bottom:1px dashed var(--line);padding-bottom:3px}
.row{display:flex;gap:12px;align-items:flex-start;padding:5px 14px;border-bottom:1px solid #0c1730}
.row:hover{background:var(--rowh)}.row .l{flex:1;min-width:240px}.row .nm{color:var(--fg)}
.row.menu .nm{color:var(--acc);cursor:pointer}.row.menu .nm:before{content:"\25BA  ";color:var(--gold)}
.row.menu:hover{background:var(--bar)}
.row .hp{color:var(--mut);font-size:11.5px;margin-top:2px;max-width:780px}
.row .rt{flex:none;text-align:right;min-width:150px;color:var(--gold)}
.opt{display:inline-block;background:#0c1832;border:1px solid var(--line);border-radius:3px;padding:0 6px;margin:1px 0 1px 4px;font-size:11px;color:var(--mut)}
.opt.def{color:var(--gold);border-color:#4a4226}
.meta{color:#5d6f99;font-size:10.5px;margin-top:2px}
.hint code{background:#06102a;border:1px solid var(--line);border-radius:4px;padding:1px 6px;color:#8ee69a;font-size:11px;cursor:pointer}
.cond{margin:4px 0 2px;padding:2px 0 2px 10px;border-left:3px solid #6b4a8f;color:#caa9e6;font-size:11.5px}
.cond b{color:#e6c8ff;font-weight:600}
.cond a.cref{color:#bfe0ff;cursor:pointer;border-bottom:1px dotted #5a7db0}
.cond a.cref:hover{color:#fff;border-bottom-color:#bfe0ff;background:#1c3a66}
.cgrp{border-left:1px dashed #2a2350;margin-left:6px;padding-left:6px}
.depthpad{padding-left:calc(var(--d,0)*14px)}
#results{position:absolute;left:0;right:0;top:100%;background:#0c1832;border:1px solid var(--line);max-height:60vh;overflow:auto;display:none;z-index:20}
#results .r{padding:6px 12px;cursor:pointer;border-bottom:1px solid #0e1a33}#results .r:hover{background:var(--bar)}
#results .f{color:var(--gold)}#results .h{color:var(--mut);font-size:11px;margin-top:2px}
#results .tag{background:#3a2f5e;color:#cbb6ff;border-radius:3px;padding:0 5px;font-size:10px;margin-left:6px;text-transform:uppercase}
#results .h .cl{color:#8aa0c8}#results mark{background:var(--acc);color:#06102a;border-radius:2px}
.hl{background:#143a6b;outline:1px solid var(--acc)}
.empty{color:var(--mut);text-align:center;padding:60px 20px;font-size:14px}
.empty b{color:var(--gold)}
body.drag:after{content:"\2913  drop .ifr.txt to load";position:fixed;inset:0;background:rgba(8,16,40,.88);color:var(--gold);display:flex;align-items:center;justify-content:center;font-size:24px;z-index:100;border:3px dashed var(--acc)}
select.ctl,input.ctl{background:#0c1832;color:var(--fg);border:1px solid var(--line);border-radius:4px;font:inherit;font-size:11px;padding:2px 4px;max-width:240px}
select.ctl:focus,input.ctl:focus{border-color:var(--acc);outline:none}
input.ctl.num{width:140px}
.row.changed{background:#13233f}.row.changed>.l>.nm{color:var(--gold)}
.row.changed select.ctl,.row.changed input.ctl{border-color:var(--gold);color:var(--gold)}
.cmds{position:fixed;right:14px;bottom:14px;width:480px;max-width:46vw;background:#0b1730;border:1px solid var(--line);border-radius:8px;box-shadow:0 8px 28px rgba(0,0,0,.55);z-index:40;display:flex;flex-direction:column}
.cmds.has{border-color:var(--gold)}
.cmdhdr{display:flex;gap:8px;align-items:center;padding:7px 10px;cursor:pointer;border-bottom:1px solid var(--line);user-select:none}
.cmdhdr .ttl{color:var(--gold);font-weight:700}.cmdhdr #cmdcount{color:var(--mut)}.cmdhdr .grow{flex:1}
.cmds.collapsed #cmdbox{display:none}.cmds.collapsed .cmdhdr{border-bottom:none}
#cmdbox{height:210px;overflow:auto;background:#06102a;border-radius:0 0 8px 8px}
.citem{position:relative;padding:5px 30px 6px 9px;border-bottom:1px solid #0e1a33;cursor:pointer;font:12px/1.45 ui-monospace,Menlo,Consolas,monospace}
.citem:hover{background:#11233f}
.citem .cl1{color:#7e93bf}.citem .cl2{color:#9ee6a6;white-space:pre-wrap;word-break:break-all}
.cdel{position:absolute;right:6px;top:6px;background:#2a1530;color:#ff9a9a;border:1px solid #5a2a3a;border-radius:4px;cursor:pointer;font:inherit;line-height:1;padding:1px 7px}
.cdel:hover{background:#4a1a2a;color:#fff}
.cempty{color:var(--mut);padding:16px;text-align:center}
.btn.sm{padding:3px 8px;font-size:11px}
</style></head><body>
<header><b>BIOS IFR Browser</b> <span id="stats" style="color:var(--mut)">loading…</span>
<label class="btn">Load .ifr.txt<input id="file" type="file" accept=".txt,.ifr" style="display:none"></label>
<button class="btn" id="forget" style="display:none" onclick="clearSaved()" title="Remove the saved dump from this browser">forget</button>
<div class="sbox"><input id="search" placeholder="search settings, help, options, offsets… (tdc, 0x191, turbo performance)"><div id="results"></div></div>
</header>
<div id="main"><div id="side"></div><div id="view"><div id="crumb"></div><div id="form" class="form"><div class="empty">loading…</div></div></div></div>
<div id="cmds" class="cmds">
 <div class="cmdhdr" onclick="if(event.target.tagName!=='BUTTON')document.getElementById('cmds').classList.toggle('collapsed')">
  <span class="ttl">⌨ startup.nsh</span> <span id="cmdcount">0 changes</span><span class="grow"></span>
  <button class="btn sm" onclick="copyCmds()" title="Copy the setup_var.efi commands">copy</button><button class="btn sm" onclick="saveCmds()" title="Download just startup.nsh">.nsh</button><button class="btn sm" onclick="downloadBundle()" title="Download a ready-to-boot USB .zip: UEFI shell + setup_var.efi + your startup.nsh">bundle&nbsp;.zip</button><button class="btn sm" onclick="clearCmds()">clear</button>
 </div>
 <div id="cmdbox" class="cmdlist"></div>
</div>

<script>
var esc=function(s){return (s==null?'':String(s)).replace(/[&<>]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;'}[c]})};
var D={},FORMS={},ORDER=[],TITLES={},IDX=[],nav=[];
var side=document.getElementById('side'),view=document.getElementById('form'),crumb=document.getElementById('crumb'),sb=document.getElementById('search'),res=document.getElementById('results'),stats=document.getElementById('stats');
var EXPR={},COND={},SKIP={},QLEAF={},SYM={Equal:'==',NotEqual:'!=',LessThan:'&lt;',LessEqual:'&lt;=',GreaterThan:'&gt;',GreaterEqual:'&gt;=',BitwiseAnd:'&amp;',BitwiseOr:'|'};
'EqIdVal EqIdValList EqIdId And Or Not True False Equal NotEqual LessThan LessEqual GreaterThan GreaterEqual BitwiseAnd BitwiseOr QuestionRef1 Get Uint8 Uint16 Uint32 Uint64 Value Conditional Match StringRef1 ToString Dup Catenate Span Find Mid Token'.split(' ').forEach(function(x){EXPR[x]=1});
'SuppressIf GrayOutIf DisableIf InconsistentIf NoSubmitIf WarningIf'.split(' ').forEach(function(x){COND[x]=1});
'End Default FormSet DefaultStore Guid VarStore VarStoreNameValue VarStoreEfi Image Locked Modal RefreshId Refresh Animation ResetButton'.split(' ').forEach(function(x){SKIP[x]=1});
'OneOf Numeric CheckBox Text OrderedList Date Time Password String Action'.split(' ').forEach(function(x){QLEAF[x]=1});
var _rc={};
function attr(s,k,quoted){var key=k+(quoted?'"':'#');var re=_rc[key];if(!re){re=_rc[key]=quoted?new RegExp(k+': "([^"]*)"'):new RegExp(k+': (0x[0-9A-Fa-f]+|\\d+)');}var m=re.exec(s);return m?m[1]:null;}
function buildData(text){
 var LINE=/^0x[0-9A-Fa-f]+:[ ]?(\t*)(.*)$/, recs=[], arr=text.split(/\r?\n/);
 for(var li=0;li<arr.length;li++){var m=LINE.exec(arr[li]);if(!m)continue;var body=m[2].replace(/\s+$/,'');if(!body)continue;recs.push([m[1].length,body.split(' ',1)[0].replace(/:$/,''),body]);}
 var vs={};
 for(var i=0;i<recs.length;i++)if(recs[i][1]==='VarStore'){var mm=recs[i][2].match(/VarStoreId: (0x[0-9A-Fa-f]+), Size: 0x[0-9A-Fa-f]+, Name: "([^"]+)"/);if(mm)vs[parseInt(mm[1],16)]=mm[2];}
 var qmap={},qform={},cf=null;
 for(i=0;i<recs.length;i++){var b=recs[i][2];if(recs[i][1]==='Form')cf=attr(b,'FormId',0);var qid=attr(b,'QuestionId',0);if(qid){var k=parseInt(qid,16),nm=attr(b,'Prompt',1);if(!(k in qmap)||nm)qmap[k]={nm:nm,vs:attr(b,'VarStoreId',0),off:attr(b,'VarOffset',0)};if(nm&&cf&&!(k in qform))qform[k]=cf;}}
 function vhint(b){var vsid=attr(b,'VarStoreId',0),off=attr(b,'VarOffset',0),sz=attr(b,'Size',0);if(!(vsid&&off&&sz))return '';var nb=Math.max(1,(parseInt(sz)/8)|0);return 'setup_var.efi '+off+' <val> -s 0x'+nb.toString(16).toUpperCase()+' -n '+(vs[parseInt(vsid,16)]||('VS'+vsid));}
 function qlink(qid){if(!qid)return '?';var e=qmap[parseInt(qid,16)];if(e&&e.nm){var loc=(e.vs&&e.off)?(' @'+(vs[parseInt(e.vs,16)]||e.vs)+':'+e.off):'';var disp=esc(e.nm)+esc(loc);var fid=qform[parseInt(qid,16)];if(fid){var tn=e.nm.toLowerCase().replace(/['"]/g,'');return '<a class="cref" onclick="navTo(\''+fid+'\',{text:\''+tn+'\'})">'+disp+'</a>';}return disp;}return 'Q'+esc(qid);}
 function renderExpr(ex){var st=[];for(var i2=0;i2<ex.length;i2++){var op=ex[i2][1],b=ex[i2][2];
  if(op==='EqIdVal')st.push(qlink(attr(b,'QuestionId',0))+' == '+esc(attr(b,'Value',0)));
  else if(op==='EqIdValList')st.push(qlink(attr(b,'QuestionId',0))+' &isin; {list}');
  else if(op==='EqIdId'){var ids=(b.match(/QuestionId\d?: (0x[0-9A-Fa-f]+)/g)||[]).map(function(s){return s.replace(/.*: /,'')});st.push(ids.length>=2?(qlink(ids[0])+' == '+qlink(ids[1])):'EqIdId');}
  else if(op==='QuestionRef1'||op==='Get')st.push(qlink(attr(b,'QuestionId',0)));
  else if(op==='Uint8'||op==='Uint16'||op==='Uint32'||op==='Uint64'||op==='Value')st.push(esc(attr(b,'Value',0)||op));
  else if(op==='True')st.push('TRUE'); else if(op==='False')st.push('FALSE');
  else if(op==='Not')st.push('!('+(st.pop()||'?')+')');
  else if(op==='And'||op==='Or'){var y=st.pop()||'?',x=st.pop()||'?';st.push('('+x+' '+(op==='And'?'&amp;&amp;':'||')+' '+y+')');}
  else if(SYM[op]){var y2=st.pop()||'?',x2=st.pop()||'?';st.push('('+x2+' '+SYM[op]+' '+y2+')');}
  else st.push(esc(op));}
  return st.join(' ');}
 function make(op,b){var n={op:op,label:attr(b,'Title',1)||attr(b,'Prompt',1)||op,help:attr(b,'Help',1)||'',opts:[],children:[],meta:''};var meta=[];['VarStoreId','VarOffset','Size','Min','Max'].forEach(function(k){var v=attr(b,k,0);if(v)meta.push(k+'='+v);});n.meta=meta.join(' ');var vo=attr(b,'VarOffset',0),vsi=attr(b,'VarStoreId',0),vsz=attr(b,'Size',0);if(vo&&vsi&&vsz){n.off=vo;n.vsn=vs[parseInt(vsi,16)]||('VS'+vsi);n.bytes=Math.max(1,(parseInt(vsz)/8)|0);}if(QLEAF[op])n.hint=vhint(b);if(op==='Ref')n.ref=attr(b,'FormId',0);var t=attr(b,'Text',1);if(t&&op==='Text')n.help=(n.help+'  ['+t+']').replace(/^\s+|\s+$/g,'');return n;}
 function parse(items){var nodes=[],i3=0,N=items.length;while(i3<N){var d=items[i3][0],op=items[i3][1],b=items[i3][2],j=i3+1;while(j<N&&items[j][0]>d)j++;var sub=items.slice(i3+1,j);i3=j;
   if(SKIP[op]||EXPR[op]||op==='OneOfOption')continue;
   if(COND[op]){var kk=0;while(kk<sub.length&&EXPR[sub[kk][1]])kk++;nodes.push({op:op,cond:renderExpr(sub.slice(0,kk)),children:parse(sub.slice(kk))});continue;}
   var node=make(op,b);
   if(sub.length){if(op==='OneOf'){for(var s2=0;s2<sub.length;s2++)if(sub[s2][1]==='OneOfOption')node.opts.push({v:attr(sub[s2][2],'Value',0)||'',t:attr(sub[s2][2],'Option',1)||'',d:sub[s2][2].indexOf(', Default')>=0});}node.children=parse(sub);}
   nodes.push(node);}
  return nodes;}
 var forms={},order=[];
 function count(ns){var c=ns.length;for(var z=0;z<ns.length;z++)c+=count(ns[z].children||[]);return c;}
 var i4=0,N4=recs.length;
 while(i4<N4){if(recs[i4][1]==='Form'){var depth=recs[i4][0],fid=attr(recs[i4][2],'FormId',0)||('f'+i4),title=attr(recs[i4][2],'Title',1)||fid,j4=i4+1;while(j4<N4&&recs[j4][0]>depth)j4++;var block=[];for(var x4=i4+1;x4<j4;x4++)block.push([recs[x4][0]-depth,recs[x4][1],recs[x4][2]]);var nodes=parse(block),c4=count(nodes);if(!(fid in forms)){order.push(fid);forms[fid]={title:title,nodes:nodes,c:c4};}else if(c4>forms[fid].c){forms[fid]={title:title,nodes:nodes,c:c4};}i4=j4;}else i4++;}
 for(var fk in forms)delete forms[fk].c;
 var incoming={};
 function collect(fid,ns){for(var z=0;z<ns.length;z++){var n=ns[z];if(n.ref){(incoming[n.ref]=incoming[n.ref]||[]).push({src:fid,label:n.label||''});}if(n.children)collect(fid,n.children);}}
 for(var fk2 in forms)collect(fk2,forms[fk2].nodes);
 for(var t2 in incoming){var seen={},dd=[];incoming[t2].forEach(function(e){var key=e.src+'|'+e.label;if(!seen[key]){seen[key]=1;dd.push(e);}});incoming[t2]=dd;}
 var titles={};for(var fk3 in forms)titles[fk3]=forms[fk3].title;
 var nset=0,ncond=0;for(i=0;i<recs.length;i++){if(QLEAF[recs[i][1]])nset++;if(COND[recs[i][1]])ncond++;}
 return {forms:forms,order:order,incoming:incoming,titles:titles,nset:nset,ncond:ncond,sig:'ifrchg_'+text.length+'_'+order.length+'_'+nset};
}
function commit(hl){render(hl);var top=nav[nav.length-1];history.pushState({nav:nav.slice(),hl:hl||null},'','#'+top)}
function navTo(fid,hl){if(!FORMS[fid])return;nav=[fid];commit(hl||null)}
function entry(fid){navTo(fid)}
function push(fid){if(FORMS[fid]){nav.push(fid);commit(null)}}
function jumpIdx(i){nav=nav.slice(0,i+1);commit(null)}
function back(){history.back()}
function goBacklink(src,from){navTo(src,{ref:from})}
function condRow(n,d){var verb=n.op==='GrayOutIf'?'grayed-out when':(n.op==='DisableIf'?'disabled when':(n.op==='InconsistentIf'||n.op==='NoSubmitIf'||n.op==='WarningIf'?'error when':'hidden when'));var c=n.cond||'(always)';return '<div class="cond depthpad" style="--d:'+d+'">🔒 '+verb+': <b>'+c+'</b></div><div class="cgrp">'+kids(n,d)+'</div>';}
function rowHTML(n,d){var pad='style="--d:'+d+'"';
 if(['SuppressIf','GrayOutIf','DisableIf','InconsistentIf','NoSubmitIf','WarningIf'].indexOf(n.op)>=0)return condRow(n,d);
 if(n.op==='Subtitle')return (n.label?'<div class="sub depthpad" '+pad+'>'+esc(n.label)+'</div>':'')+kids(n,d);
 if(n.op==='Ref'){var t=TITLES[n.ref],nm=esc(n.label||t||n.ref),click=t?(' onclick="push(\''+n.ref+'\')"'):'';return '<div class="row menu depthpad" data-ref="'+esc(n.ref||'')+'" '+pad+'><div class="l"><div class="nm"'+click+'>'+nm+(t?'':' <span class=meta>(→'+esc(n.ref||'?')+')</span>')+'</div>'+(n.help?'<div class="hp">'+esc(n.help)+'</div>':'')+'</div><div class="rt">'+(t?'submenu':'')+'</div></div>'+kids(n,d);}
 var rt=ctlHTML(n);
 var hint=n.hint?'<div class="hint"><code title="click to copy" onclick="copy(this)">'+esc(n.hint)+'</code></div>':'';
