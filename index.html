<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>BIOS Hidden Options Editor</title>
<style>
:root{--bg:#0a1530;--bar:#13284f;--fg:#cfe0ff;--mut:#7e93bf;--acc:#7ab8ff;--gold:#ffd479;--line:#1d3461;--rowh:#15315f}
*{box-sizing:border-box}html,body{margin:0;height:100%}
body{background:var(--bg);color:var(--fg);font:13px/1.45 ui-monospace,Menlo,Consolas,monospace;display:flex;flex-direction:column}
header{background:#06102a;border-bottom:1px solid var(--line);padding:8px 12px;display:flex;flex-wrap:wrap;gap:10px;row-gap:8px;align-items:center;flex:none}
header b{color:var(--gold);flex:none}
#stats{flex:0 1 auto;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.btn{background:#13284f;color:var(--fg);border:1px solid var(--line);border-radius:6px;padding:6px 10px;cursor:pointer;font:inherit;white-space:nowrap;flex:none}
.btn:hover{border-color:var(--acc)}
.sbox{position:relative;flex:1 1 340px;min-width:240px;max-width:580px}
.sbox:before{content:"\1F50D";position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:12px;opacity:.55;pointer-events:none}
#search{width:100%;padding:7px 10px 7px 30px;background:#0c1832;border:1px solid var(--line);border-radius:6px;color:var(--fg);font:inherit}
#search:focus{border-color:var(--acc);outline:none}
#main{flex:1;display:flex;min-height:0}
#side{width:280px;border-right:1px solid var(--line);overflow:auto;background:#091228;flex:none}
.sidehdr{padding:6px 12px;color:#5d6f99;font-size:10.5px;border-bottom:1px solid var(--line);text-transform:uppercase;letter-spacing:.04em}
#side .sf{padding:5px 12px;cursor:pointer;color:var(--mut);border-bottom:1px solid #0e1a33;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#side .sf:hover{background:var(--rowh);color:var(--fg)}#side .sf.act{background:var(--bar);color:var(--gold)}
#view{flex:1;overflow:auto}
#crumb{padding:8px 16px;color:var(--mut);background:#091228;border-bottom:1px solid var(--line);position:sticky;top:0;z-index:5}
#crumb a{color:var(--acc);cursor:pointer}#crumb .bk{color:var(--gold);margin-right:10px;cursor:pointer}
.form{max-width:1100px;margin:0 auto;padding:6px 0 60px}
.ftitle{text-align:center;color:var(--gold);font-weight:700;letter-spacing:.06em;padding:14px 14px 4px;text-transform:uppercase}
.backlinks{text-align:center;font-size:11.5px;color:var(--mut);padding:0 14px 12px;border-bottom:1px solid var(--line);margin-bottom:4px}
.backlinks a{color:var(--acc);cursor:pointer}.backlinks a:hover{text-decoration:underline}
.backlinks .none{color:#5d6f99;font-style:italic}.backlinks .meta{color:#456}
.sub{color:var(--acc);font-weight:700;margin:16px 12px 4px;border-bottom:1px dashed var(--line);padding-bottom:3px}
.row{display:flex;gap:12px;align-items:flex-start;padding:5px 14px;border-bottom:1px solid #0c1730}
.row:hover{background:var(--rowh)}.row .l{flex:1;min-width:240px}.row .nm{color:var(--fg)}
.row.menu .nm{color:var(--acc);cursor:pointer}.row.menu .nm:before{content:"\25BA  ";color:var(--gold)}
.row.menu:hover{background:var(--bar)}
.row .hp{color:var(--mut);font-size:11.5px;margin-top:2px;max-width:780px}
.row .rt{flex:none;text-align:right;min-width:150px;color:var(--gold)}
.opt{display:inline-block;background:#0c1832;border:1px solid var(--line);border-radius:3px;padding:0 6px;margin:1px 0 1px 4px;font-size:11px;color:var(--mut)}
.opt.def{color:var(--gold);border-color:#4a4226}
.meta{color:#5d6f99;font-size:10.5px;margin-top:2px}
.hint code{background:#06102a;border:1px solid var(--line);border-radius:4px;padding:1px 6px;color:#8ee69a;font-size:11px;cursor:pointer}
.cond{margin:4px 0 2px;padding:2px 0 2px 10px;border-left:3px solid #6b4a8f;color:#caa9e6;font-size:11.5px}
.cond b{color:#e6c8ff;font-weight:600}
.cond a.cref{color:#bfe0ff;cursor:pointer;border-bottom:1px dotted #5a7db0}
.cond a.cref:hover{color:#fff;border-bottom-color:#bfe0ff;background:#1c3a66}
.cond .qref{color:#9fb4dc;border-bottom:1px dotted #44597f}.cond .qref .ty{color:#6f84ad;font-size:10px}
.infer{display:none;color:#7fd6a6;font-style:italic}body.show-infer .infer{display:inline}
#infertgl{display:none;align-items:center;gap:5px}#infertgl input{margin:0}
.cond .qx{border-radius:3px;padding:0 1px;cursor:pointer}.cond .qx:hover{background:#22190a}
.cond .qx .ovh{color:var(--gold);background:rgba(255,212,121,.16);border:1px solid rgba(255,212,121,.40);font-size:9.5px;font-weight:700;margin-left:3px;opacity:.72;border-radius:8px;padding:0 4px;cursor:pointer;vertical-align:1px}
.cond .qx:hover .ovh{opacity:1;background:rgba(255,212,121,.34)}
.cond .qx.ov{background:#3a2a12;outline:1px solid #7a5a1e}.cond .qx.ov .ovh{opacity:1}
#ovpop{position:absolute;z-index:60;background:#0c1832;border:1px solid var(--gold);border-radius:7px;padding:9px 10px;display:none;box-shadow:0 6px 22px #000a;font-size:12px;color:var(--fg)}
#ovpop .t{color:var(--mut);margin-bottom:6px;max-width:240px}#ovpop b{color:var(--gold)}
#ovpop input{width:120px;background:#06102a;border:1px solid var(--line);color:var(--fg);border-radius:5px;padding:4px 6px;font:inherit}#ovpop .b{margin-top:8px;display:flex;gap:6px}#ovpop .btn{padding:4px 9px}
.subt{color:var(--mut);font-weight:normal;font-size:11px;flex:none}
@media(max-width:760px){.subt{display:none}}
.spin{display:inline-block;width:11px;height:11px;border:2px solid rgba(122,184,255,.25);border-top-color:var(--acc);border-radius:50%;animation:spin .7s linear infinite;vertical-align:-1px;margin-right:6px}
.spin.big{width:26px;height:26px;border-width:3px;margin:0}
@keyframes spin{to{transform:rotate(360deg)}}
.land{max-width:680px;margin:6vh auto 0;text-align:center}
.land .big{font-size:20px;color:var(--fg);font-weight:600}.land .big b{color:var(--gold)}
.land .sub{margin-top:10px;color:#a9bce0;font-size:13.5px;line-height:1.6}.land .sub b{color:var(--fg)}
.land .steps{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin:20px 0 4px}
.land .steps span{flex:1 1 180px;max-width:210px;background:#0c1832;border:1px solid var(--line);border-radius:8px;padding:11px 12px;color:#b8c8ea;font-size:12.5px;text-align:left}
.land .steps b{display:inline-flex;width:18px;height:18px;align-items:center;justify-content:center;background:var(--acc);color:#06102a;border-radius:50%;font-size:11px;margin-right:6px}
.land .note{margin-top:16px;color:var(--mut);font-size:12px;line-height:1.6}.land .note b{color:#bfe0ff}
.land .note.tiny{font-size:11px;margin-top:10px}.land code{background:#0c1832;border:1px solid var(--line);border-radius:3px;padding:0 4px}
.presets{padding:8px 10px}.presets .pl{color:var(--mut);font-size:11px;margin-right:4px}
.chip{display:inline-block;background:#10254d;border:1px solid var(--line);color:var(--acc);border-radius:13px;padding:3px 10px;margin:3px 4px 3px 0;cursor:pointer;font-size:12px}
.chip:hover{background:#17386e;color:#fff}
#logmodal{position:fixed;inset:0;background:#000a;display:none;z-index:90;align-items:center;justify-content:center;padding:20px}
#logmodal .box{background:#0c1832;border:1px solid var(--line);border-radius:10px;max-width:760px;width:100%;max-height:82vh;display:flex;flex-direction:column;padding:14px}
#logmodal .hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}#logmodal .hd b{color:var(--gold)}
#logmodal pre{white-space:pre-wrap;word-break:break-word;overflow:auto;background:#06102a;border:1px solid var(--line);border-radius:6px;padding:10px;font-size:12px;flex:1;margin:0}
.cgrp{border-left:1px dashed #2a2350;margin-left:6px;padding-left:6px}
.depthpad{padding-left:calc(var(--d,0)*14px)}
#results{position:absolute;left:0;right:0;top:100%;background:#0c1832;border:1px solid var(--line);max-height:60vh;overflow:auto;display:none;z-index:20}
#results .r{padding:6px 12px;cursor:pointer;border-bottom:1px solid #0e1a33}#results .r:hover{background:var(--bar)}
#results .f{color:var(--gold)}#results .h{color:var(--mut);font-size:11px;margin-top:2px}
#results .tag{background:#3a2f5e;color:#cbb6ff;border-radius:3px;padding:0 5px;font-size:10px;margin-left:6px;text-transform:uppercase}
#results .h .cl{color:#8aa0c8}#results mark{background:var(--acc);color:#06102a;border-radius:2px}
.hl{background:#143a6b;outline:1px solid var(--acc)}
.empty{color:var(--mut);text-align:center;padding:60px 20px;font-size:14px}
.empty b{color:var(--gold)}
body.drag:after{content:"\2913  drop .ifr.txt to load";position:fixed;inset:0;background:rgba(8,16,40,.88);color:var(--gold);display:flex;align-items:center;justify-content:center;font-size:24px;z-index:100;border:3px dashed var(--acc)}
select.ctl,input.ctl{background:#0c1832;color:var(--fg);border:1px solid var(--line);border-radius:4px;font:inherit;font-size:11px;padding:2px 4px;max-width:240px}
select.ctl:focus,input.ctl:focus{border-color:var(--acc);outline:none}
input.ctl.num{width:140px}
.row.changed{background:#13233f}.row.changed>.l>.nm{color:var(--gold)}
.row.changed select.ctl,.row.changed input.ctl{border-color:var(--gold);color:var(--gold)}
.cmds{position:fixed;right:14px;bottom:14px;width:480px;max-width:46vw;background:#0b1730;border:1px solid var(--line);border-radius:8px;box-shadow:0 8px 28px rgba(0,0,0,.55);z-index:40;display:flex;flex-direction:column}
.cmds.has{border-color:var(--gold)}
.cmdhdr{display:flex;gap:8px;align-items:center;padding:7px 10px;cursor:pointer;border-bottom:1px solid var(--line);user-select:none}
.cmdhdr .ttl{color:var(--gold);font-weight:700}.cmdhdr #cmdcount{color:var(--mut)}.cmdhdr .grow{flex:1}
.cmds.collapsed #cmdbox{display:none}.cmds.collapsed .cmdhdr{border-bottom:none}
#cmdbox{height:210px;overflow:auto;background:#06102a;border-radius:0 0 8px 8px}
.citem{position:relative;padding:5px 30px 6px 9px;border-bottom:1px solid #0e1a33;cursor:pointer;font:12px/1.45 ui-monospace,Menlo,Consolas,monospace}
.citem:hover{background:#11233f}
.citem .cl1{color:#7e93bf}.citem .cl2{color:#9ee6a6;white-space:pre-wrap;word-break:break-all}
.cdel{position:absolute;right:6px;top:6px;background:#2a1530;color:#ff9a9a;border:1px solid #5a2a3a;border-radius:4px;cursor:pointer;font:inherit;line-height:1;padding:1px 7px}
.cdel:hover{background:#4a1a2a;color:#fff}
.cempty{color:var(--mut);padding:16px;text-align:center}
.btn.sm{padding:3px 8px;font-size:11px}
</style></head><body>
<header><b>BIOS Hidden Options Editor</b><span class="subt">unlock &amp; edit hidden UEFI&nbsp;Setup options</span> <span id="stats" style="color:var(--mut)">loading…</span>
<label class="btn">Load BIOS<input id="file" type="file" accept=".bin,.rom,.fd,.fv,.cap,.txt,.ifr" style="display:none" title="a raw BIOS / SPI flash image (or a .ifr.txt dump)"></label>
<button class="btn" id="forget" style="display:none" onclick="clearSaved()" title="Remove the saved dump from this browser">forget</button>
<button class="btn" id="logbtn" style="display:none" onclick="showLog()" title="Extraction diagnostics — include this when reporting a problem">log</button>
<label class="btn" id="infertgl" title="Infer names for unnamed control questions from other BIOS modules — heuristic, matched by VarStore GUID + offset"><input type="checkbox" id="inferck">infer names</label>
<div class="sbox"><input id="search" placeholder="search hidden settings — CFG Lock, overclock, undervolt, 0x191…"><div id="results"></div></div>
</header>
<div id="main"><div id="side"></div><div id="view"><div id="crumb"></div><div id="form" class="form"><div class="empty">loading…</div></div></div></div>
<div id="cmds" class="cmds">
 <div class="cmdhdr" onclick="if(event.target.tagName!=='BUTTON')document.getElementById('cmds').classList.toggle('collapsed')">
  <span class="ttl">⌨ startup.nsh</span> <span id="cmdcount">0 changes</span><span class="grow"></span>
  <button class="btn sm" onclick="copyCmds()" title="Copy the setup_var.efi commands">copy</button><button class="btn sm" onclick="saveCmds()" title="Download just startup.nsh">.nsh</button><button class="btn sm" onclick="downloadBundle()" title="Download a ready-to-boot USB .zip: UEFI shell + setup_var.efi + your startup.nsh">bundle&nbsp;.zip</button><button class="btn sm" onclick="clearCmds()">clear</button>
 </div>
 <div id="cmdbox" class="cmdlist"></div>
</div>

<script type="text/plain" id="ifr"></script>
<script type="module">
/* Raw-BIOS → IFR pipeline, embedded at build time (UEFITool decompressors +
   IFRExtractor-RS, both WASM, + the JS firmware-volume walker). If the build
   placeholders were not filled, this no-ops and the app stays text-only. */
window.__biosReady = (async function(){
  var D="__DECOMP_MJS_B64__", J="__IFR_JS_B64__", W="__IFR_WASM_B64__", F="__FFS_B64__";
  if(D.lastIndexOf("__DECOMP",0)===0){ window.__biosDisabled=true; return false; }
  function u8(s){var r=atob(s),a=new Uint8Array(r.length);for(var i=0;i<r.length;i++)a[i]=r.charCodeAt(i);return a;}
  await import("data:text/javascript;base64,"+F);                       // sets globalThis.FFS
  var decompMod=await import("data:text/javascript;base64,"+D);
  var ifrMod=await import("data:text/javascript;base64,"+J);
  await ifrMod.default({module_or_path:u8(W)});
  var mod=await decompMod.default();
  function cp(a){var p=mod._malloc(a.length||1);mod.HEAPU8.set(a,p);return p;}
  function lzma(a){var sp=cp(a),zp=mod._malloc(4);var st=mod._wrap_lzma_get_size(sp,a.length,zp);if(st!==0){mod._free(sp);mod._free(zp);return{status:st,data:null};}var n=mod.getValue(zp,'i32')>>>0,dp=mod._malloc(n||1);st=mod._wrap_lzma_decode(sp,a.length,dp);var d=mod.HEAPU8.slice(dp,dp+n);mod._free(sp);mod._free(zp);mod._free(dp);return{status:st,data:d};}
  function efi(a){var sp=cp(a),dsP=mod._malloc(4),ssP=mod._malloc(4);var st=mod._wrap_tiano_get_size(sp,a.length,dsP,ssP);if(st!==0){mod._free(sp);mod._free(dsP);mod._free(ssP);return{status:st,data:null};}var n=mod.getValue(dsP,'i32')>>>0,dp=mod._malloc(n||1);var r=mod._wrap_efi_decode(sp,a.length,dp,n,0);if(r!==0)r=mod._wrap_efi_decode(sp,a.length,dp,n,1);var d=mod.HEAPU8.slice(dp,dp+n);mod._free(sp);mod._free(dsP);mod._free(ssP);mod._free(dp);return{status:r,data:d};}
  var decoder={lzma:lzma,efi:efi};
  // VarStores whose GUID is too generic to match names by offset (EFI global var store).
  var GENERIC={"8BE4DF61-93CA-11D2-AA0D-00E098032B8C":1};
  function pickSetupText(o){var parts=o.split(/^@@@IFR-SEGMENT (.+) @@@\n/m);for(var k=1;k+1<parts.length;k+=2){if(/en-US\.uefi$/.test(parts[k]))return parts[k+1];}return parts[2]||o;}
  // Layer 2: from EVERY module's IFR, map (VarStore GUID : offset) -> name, keeping
  // only keys with a single consistent name. Used to *infer* names for the Setup module's
  // nameless control questions. Heuristic — surfaced as such in the UI.
  function buildInferMap(modules){
    var acc={};
    var VS=/VarStore Guid: ([0-9A-Fa-f-]+), VarStoreId: (0x[0-9A-Fa-f]+), Size: 0x[0-9A-Fa-f]+, Name: "([^"]*)"/g;
    var QD=/(?:OneOf|Numeric|CheckBox|OrderedList|Password|String|Date|Time|Action) Prompt: "([^"]*)"[^\n]*?QuestionId: 0x[0-9A-Fa-f]+, VarStoreId: (0x[0-9A-Fa-f]+), VarOffset: (0x[0-9A-Fa-f]+)/g;
    for(var i=0;i<modules.length;i++){
      var o=ifrMod.extract(modules[i].data,false);
      if(o.indexOf("@@@IFR-SEGMENT")===-1)continue;
      var vsg={},m;VS.lastIndex=0;while((m=VS.exec(o)))vsg[m[2].toUpperCase()]=m[1].toUpperCase();
      QD.lastIndex=0;while((m=QD.exec(o))){var nm=m[1];if(!nm||nm==="N/A")continue;var g=vsg[m[2].toUpperCase()];if(!g||GENERIC[g])continue;var key=g+":"+m[3].toUpperCase();(acc[key]=acc[key]||{})[nm]=1;}
    }
    var out={};for(var k in acc){var names=Object.keys(acc[k]);if(names.length===1)out[k]=names[0];}
    return out;
  }
  function tick(){return new Promise(function(r){setTimeout(r,16);});}
  function nowms(){return (typeof performance!=='undefined'&&performance.now)?performance.now():0;}
  function finishLog(lines,t0){return lines.concat(['elapsed: '+Math.round(nowms()-t0)+' ms','engine: IFRExtractor-RS 1.6.1 + UEFITool LZMA/Tiano (WASM)','agent: '+navigator.userAgent]).join('\n');}
  window.biosToIfr=async function(image,onp){
    var t0=nowms();
    var log=['BIOS Hidden Options Editor — extraction log','image: '+image.length+' bytes ('+(image.length/1048576).toFixed(1)+' MB)'];
    onp&&onp('Scanning firmware volumes & decompressing…');await tick();
    var res=self.FFS.findSetup(image,decoder);
    log.push('firmware modules (PE32) found: '+res.all.length);
    log.push('Setup-module candidates: '+res.setup.length+(res.setup.length?(' ('+res.setup.map(function(m){return m.data.length+'B';}).join(', ')+')'):''));
    if(res.errors&&res.errors.length)log.push('decompress errors ('+res.errors.length+'): '+res.errors.slice(0,12).join(' | '));
    if(res.skipped&&res.skipped.length){var uq=res.skipped.filter(function(v,i,a){return a.indexOf(v)===i;});log.push('skipped/unsupported sections ('+res.skipped.length+'): '+uq.slice(0,12).join(' | '));}
    onp&&onp('Extracting Setup options…');await tick();
    var cands=res.setup.length?res.setup:res.all,text=null,chosen=null;
    for(var c=0;c<cands.length&&!text;c++){var o=ifrMod.extract(cands[c].data,true);if(o.indexOf("@@@IFR-SEGMENT")!==-1){text=pickSetupText(o);chosen=cands[c];}}
    if(!text){log.push('RESULT: no UEFI Setup form data found in any module');window.__exlog=finishLog(log,t0);var e=new Error('No editable BIOS settings (UEFI Setup) were found in this image. It may not be an AMI/Aptio BIOS, or the dump may be incomplete.');e.exlog=window.__exlog;throw e;}
    log.push('chosen Setup module: '+(chosen.name||'(unnamed)')+', '+chosen.data.length+' bytes');
    onp&&onp('Resolving names from other modules…');await tick();
    var infer=buildInferMap(res.all);
    log.push('inferred names from other modules: '+Object.keys(infer).length);
    log.push('RESULT: success — '+(text.match(/^0x/gm)||[]).length+' opcode lines');
    window.__exlog=finishLog(log,t0);
    return {text:text, infer:infer, log:window.__exlog};
  };
  return true;
})();
