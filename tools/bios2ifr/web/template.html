<!doctype html>
<meta charset="utf-8">
<title>BIOS &rarr; IFR (in-browser)</title>
<style>
  body{font:14px/1.5 system-ui,sans-serif;margin:2rem;max-width:60rem}
  #drop{border:2px dashed #888;border-radius:8px;padding:2rem;text-align:center;color:#555}
  #drop.over{background:#eef;border-color:#46c}
  pre{white-space:pre-wrap;background:#f6f6f6;padding:1rem;border-radius:6px;max-height:24rem;overflow:auto}
  .ok{color:#197}.err{color:#c33}
</style>
<h1>BIOS &rarr; IFR</h1>
<p>Feed a raw BIOS / SPI flash image. Everything runs in your browser: the firmware
volume is parsed, compressed sections are decompressed (LZMA / Tiano via WASM), the
<b>Setup</b> module is located, and its IFR is extracted to text — no upload.</p>
<div id="drop">Drop a BIOS image here, or <input type="file" id="f" accept=".bin,.rom,.fd,.cap,.fv"></div>
<p id="status">Loading WASM…</p>
<pre id="out"></pre>
<button id="dl" disabled>Download IFR text</button>

<script>__FFS_JS__</script>
<script type="module">
import DecompFactory from "data:text/javascript;base64,__DECOMP_MJS_B64__";
import init, { extract } from "data:text/javascript;base64,__IFR_JS_B64__";

const IFR_WASM_B64 = "__IFR_WASM_B64__";
const statusEl = document.getElementById('status');
const outEl = document.getElementById('out');
const dlBtn = document.getElementById('dl');
const drop = document.getElementById('drop');

function b64ToU8(s){ const bin = atob(s); const u = new Uint8Array(bin.length); for(let i=0;i<bin.length;i++) u[i]=bin.charCodeAt(i); return u; }

let mod, ready = (async () => {
  mod = await DecompFactory();
  await init({ module_or_path: b64ToU8(IFR_WASM_B64) });
  statusEl.textContent = 'Ready. Drop a BIOS image.';
})();

function makeDecoder(mod){
  const copyIn = (u8)=>{ const p=mod._malloc(u8.length||1); mod.HEAPU8.set(u8,p); return p; };
  const lzma = (u8)=>{ const sp=copyIn(u8), zp=mod._malloc(4); let st=mod._wrap_lzma_get_size(sp,u8.length,zp);
    if(st!==0){mod._free(sp);mod._free(zp);return{status:st,data:null};}
    const n=mod.getValue(zp,'i32')>>>0, dp=mod._malloc(n||1); st=mod._wrap_lzma_decode(sp,u8.length,dp);
    const d=mod.HEAPU8.slice(dp,dp+n); mod._free(sp);mod._free(zp);mod._free(dp); return{status:st,data:d}; };
  const efi = (u8)=>{ const sp=copyIn(u8), dsP=mod._malloc(4), ssP=mod._malloc(4); let st=mod._wrap_tiano_get_size(sp,u8.length,dsP,ssP);
    if(st!==0){mod._free(sp);mod._free(dsP);mod._free(ssP);return{status:st,data:null};}
    const n=mod.getValue(dsP,'i32')>>>0, dp=mod._malloc(n||1);
    let r=mod._wrap_efi_decode(sp,u8.length,dp,n,0); if(r!==0) r=mod._wrap_efi_decode(sp,u8.length,dp,n,1);
    const d=mod.HEAPU8.slice(dp,dp+n); mod._free(sp);mod._free(dsP);mod._free(ssP);mod._free(dp); return{status:r,data:d}; };
  return { lzma, efi };
}

async function run(file){
  await ready;
  statusEl.textContent = `Parsing ${file.name} (${file.size.toLocaleString()} bytes)…`;
  const t0 = performance.now();
  const image = new Uint8Array(await file.arrayBuffer());
  const res = window.FFS.findSetup(image, makeDecoder(mod));
  const cands = res.setup.length ? res.setup : res.all;
  let chosen=null, full=null;
  for(const m of cands){ const o = extract(m.data, true); if(o.indexOf('@@@IFR-SEGMENT')!==-1){ chosen=m; full=o; break; } }
  const ms = Math.round(performance.now()-t0);
  if(!chosen){ statusEl.className='err'; statusEl.textContent='No IFR found.'; return null; }

  // primary segment
  const parts = full.split(/^@@@IFR-SEGMENT (.+) @@@\n/m);
  let seg=null; for(let i=1;i+1<parts.length;i+=2) if(parts[i].endsWith('en-US.uefi')){ seg=parts[i+1]; break; }
  if(seg===null) seg = parts[2] || full;

  const hashBuf = await crypto.subtle.digest('SHA-256', chosen.data);
  const sha = [...new Uint8Array(hashBuf)].map(b=>b.toString(16).padStart(2,'0')).join('');

  statusEl.className='ok';
  statusEl.textContent = `OK in ${ms} ms — ${res.all.length} PE32 modules, Setup PE32 ${chosen.data.length} bytes, SHA256 ${sha}`;
  outEl.textContent = seg.slice(0, 4000) + (seg.length>4000 ? `\n… (${seg.length.toLocaleString()} chars total)`:'');
  dlBtn.disabled = false;
  dlBtn.onclick = ()=>{ const b=new Blob([seg],{type:'text/plain'}); const a=document.createElement('a');
    a.href=URL.createObjectURL(b); a.download=(file.name.replace(/\.[^.]+$/,''))+'.ifr.txt'; a.click(); };

  window.__RESULT__ = { pe32Size: chosen.data.length, sha, segLen: seg.length, seg, ms, modules: res.all.length };
  return window.__RESULT__;
}

document.getElementById('f').addEventListener('change', e=>{ if(e.target.files[0]) run(e.target.files[0]); });
['dragover','dragenter'].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.add('over');}));
['dragleave','drop'].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.remove('over');}));
drop.addEventListener('drop', e=>{ const f=e.dataTransfer.files[0]; if(f) run(f); });
window.__runFile = run; // for headless harness
</script>
